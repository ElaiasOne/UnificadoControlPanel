services:
  - type: web
    name: unificado-control-panel-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /estado
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SERVER
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: "1433"
      - key: DB_ENCRYPT
        value: "false"
      - key: DB_TRUST_SERVER_CERTIFICATE
        value: "false"

  - type: web
    name: unificado-control-panel-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: unificado-control-panel-backend
          envVarKey: RENDER_EXTERNAL_URL
